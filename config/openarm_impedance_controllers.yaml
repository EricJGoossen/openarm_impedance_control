controller_manager:
  ros__parameters:
    update_rate: 750

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    left_impedance_controller:
      type: openarm_impedance_controller/OpenArmImpedanceController

    right_impedance_controller:
      type: openarm_impedance_controller/OpenArmImpedanceController

    left_gripper_controller:
      type: position_controllers/GripperActionController

    right_gripper_controller:
      type: position_controllers/GripperActionController

left_impedance_controller:
  ros__parameters:
    joints:
      - openarm_left_joint1
      - openarm_left_joint2
      - openarm_left_joint3
      - openarm_left_joint4
      - openarm_left_joint5
      - openarm_left_joint6
      - openarm_left_joint7
    ee_frame_name: openarm_left_hand_tcp

    do_gravity_compensation: true

    # Fallback only -- normally overridden by the motor_gains_file launch
    # argument in openarm_impedance_control.launch.py.
    motor_gains_file: "../openarm_description/assets/robot/openarm_v1.0/config/arm/control_gains.yaml"

    # TCP workspace box (m, base frame). A goal is rejected whole if any
    # waypoint's TCP falls outside. Set both to [] to disable the check.
    cartesian_position_min: [-0.8, -0.8, 0.0]
    cartesian_position_max: [ 0.8,  0.8, 1.2]

    # Joint position limits are read from the URDF -- there is no override
    # here. This margin (rad) is pulled in from each side when validating
    # goals, so waypoints must land strictly inside the mechanical range.
    joint_position_margin: 0.05

    # Runtime safety trip on TCP speed (m/s). 0 disables it.
    cartesian_velocity_limit: 0.0

    # Per-joint torque clamp (Nm) -- rated torques by motor:
    #   joints 1-2: DM-J8009P (~45 Nm rated)
    #   joint  3:   DM-J4340P (~25 Nm rated)
    #   joint  4:   DM-J4340  (~20 Nm rated)
    #   joints 5-7: DM-J4310  (~10 Nm rated)
    # Used both as the goal-validation limit and the runtime effort backstop.
    # HALVE THESE for first bring-up of this control scheme.
    joint_torque_limits: [45.0, 45.0, 25.0, 20.0, 15.0, 15.0, 15.0]

    # Estimated Cartesian wrench trip [fx fy fz mx my mz] (N, N*m)
    cartesian_wrench_limits: [50.0, 50.0, 50.0, 15.0, 15.0, 15.0]


right_impedance_controller:
  ros__parameters:
    joints:
      - openarm_right_joint1
      - openarm_right_joint2
      - openarm_right_joint3
      - openarm_right_joint4
      - openarm_right_joint5
      - openarm_right_joint6
      - openarm_right_joint7
    ee_frame_name: openarm_right_hand_tcp

    do_gravity_compensation: true

    motor_gains_file: "../openarm_description/assets/robot/openarm_v1.0/config/arm/control_gains.yaml"

    cartesian_position_min: [-0.8, -0.8, 0.0]
    cartesian_position_max: [ 0.8,  0.8, 1.2]
    joint_position_margin: 0.05

    cartesian_velocity_limit: 0.0

    joint_torque_limits: [45.0, 45.0, 25.0, 20.0, 15.0, 15.0, 15.0]

    cartesian_wrench_limits: [50.0, 50.0, 50.0, 15.0, 15.0, 15.0]


left_gripper_controller:
  ros__parameters:
    joint: openarm_left_finger_joint1
    action_monitor_rate: 20.0
    goal_tolerance: 0.01
    max_effort: 5.0
    allow_stalling: false
    stall_velocity_threshold: 0.001
    stall_timeout: 1.0


right_gripper_controller:
  ros__parameters:
    joint: openarm_right_finger_joint1
    action_monitor_rate: 20.0
    goal_tolerance: 0.01
    max_effort: 5.0
    allow_stalling: false
    stall_velocity_threshold: 0.001
    stall_timeout: 1.0